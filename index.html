<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dava Güvende AI - V7 Savunma Zırhı</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --p: #1a2a6c; --danger: #b21f1f; --gold: #fdbb2d; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--p); padding-bottom: 15px; margin-bottom: 25px; }
        .upload-zone { border: 3px dotted #cbd5e0; padding: 40px; text-align: center; border-radius: 15px; transition: 0.3s; background: #fff; }
        .upload-zone:hover { border-color: var(--p); background: #f0f4f8; }
        button { background: var(--p); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .defense-card { border-top: 5px solid var(--danger); background: #fff5f5; }
        .petition-card { border-top: 5px solid var(--p); background: #f0f7ff; grid-column: span 2; }
        
        .strategy-list { list-style: none; padding: 0; }
        .strategy-list li { margin-bottom: 12px; padding-left: 25px; position: relative; }
        .strategy-list li::before { content: '🛡️'; position: absolute; left: 0; }
        
        textarea { width: 100%; height: 250px; font-family: 'Courier New', monospace; padding: 15px; border-radius: 5px; border: 1px solid #ccc; margin-top: 10px; }
        .badge { background: var(--gold); color: #000; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚖️ Dava Güvende AI - V7</h1>
        <p>Yüklenen Dosyaya Göre Savunma Stratejisi ve Karşı Dilekçe Üretici</p>
    </div>

    <div class="upload-zone">
        <input type="file" id="pdfFile" accept=".pdf" style="display: none;">
        <label for="pdfFile" style="cursor: pointer; display: block;">
            <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" width="50"><br>
            <strong>PDF Dosyasını Buraya Bırakın veya Seçin</strong>
        </label>
        <br>
        <button onclick="analyzePDF()">Analizi Başlat ve Dilekçe Yaz</button>
    </div>

    <div id="result"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    async function analyzePDF() {
        const file = document.getElementById("pdfFile").files[0];
        if(!file) return alert("Lütfen analiz edilecek dosyayı yükleyin.");
        
        document.getElementById("result").innerHTML = "<h3>🔍 Dosya derinlemesine taranıyor...</h3>";

        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let text = "";
            for(let i=1; i<=pdf.numPages; i++){
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str.toLowerCase()).join(" ");
            }
            generateStrategy(text);
        };
        reader.readAsArrayBuffer(file);
    }

    function generateStrategy(text) {
        let isIs = text.includes("kıdem") || text.includes("ihbar") || text.includes("işçi") || text.includes("alacak");
        let isIcra = text.includes("icra") || text.includes("borç") || text.includes("ödeme emri");
        let isCeza = text.includes("savcılık") || text.includes("şikayet") || text.includes("suç");

        let html = '<div class="result-grid">';

        if(isIs) {
            html += `
            <div class="card">
                <span class="badge">ANALİZ: İŞ HUKUKU</span>
                <h3>📉 Davacı Tarafın Zayıf Noktaları</h3>
                <ul class="strategy-list">
                    <li><strong>Zamanaşımı:</strong> 5 yıllık süreyi kontrol edin, çoğu işçi bunu kaçırır.</li>
                    <li><strong>Belirsiz Alacak:</strong> Alacak kalemleri net değilse "Hukuki Yarar Yokluğu"ndan reddini isteyin.</li>
                    <li><strong>Arabuluculuk:</strong> Eğer arabuluculuğa gidilmeden dava açılmışsa doğrudan usulden reddettirin.</li>
                </ul>
            </div>
            <div class="card defense-card">
                <h3>🛡️ Sıyrılma ve Kaçınma Planı</h3>
                <ul class="strategy-list">
                    <li>"İşçi kendi istifa etti" savunmasını güçlendirin (Varsa WhatsApp kayıtları delildir).</li>
                    <li>Fazla mesai iddiasına karşı "imzalı bordro" sunarak iddianın aksini kanıtlayın.</li>
                    <li>Kötüniyet tazminatı talebi varsa, dürüstlük kuralına aykırılık vurgusu yapın.</li>
                </ul>
            </div>
            <div class="card petition-card">
                <h3>📝 Otomatik Üretilen Cevap Dilekçesi</h3>
                <p>Aşağıdaki taslak, yüklediğiniz metne istinaden karşı savunma olarak hazırlanmıştır:</p>
                <textarea>
... NÖBETÇİ İŞ MAHKEMESİNE

DOSYA NO: [Esas No]

CEVAP VEREN DAVALI: [Adınız/Unvanınız]
VEKİLİ: [Avukat Adı]

KONU: Davacının haksız ve hukuki dayanaktan yoksun davasına karşı cevaplarımızın sunulmasıdır.

AÇIKLAMALAR:
1- Davacı tarafın müvekkil şirketteki iş akdi, iddia edildiği gibi haksız değil, davacının kendi isteği ve rızasıyla (İstifa) sona ermiştir.
2- Davacının talep ettiği fazla mesai ve genel tatil ücreti alacakları asılsızdır. Ekte sunduğumuz imzalı bordrolar ve banka kayıtları borcun olmadığını ispatlamaktadır.
3- Ayrıca huzurdaki davada zamanaşımı söz konusudur. Süresi geçtikten sonra talep edilen alacakların reddi gerekir.

SONUÇ VE İSTEM: Haksız davanın reddine, yargılama giderlerinin karşı tarafa yükletilmesine karar verilmesini arz ve talep ederiz.

İMZA</textarea>
            </div>`;
        }

        if(isIcra) {
            html += `
            <div class="card">
                <span class="badge">ANALİZ: İCRA TAKİBİ</span>
                <h3>🛑 Takibi Durdurma Yolları</h3>
                <ul class="strategy-list">
                    <li>7 gün içinde "Borca İtiraz" dilekçesi vererek takibi durdurun.</li>
                    <li>Yetki itirazı yaparak dosyayı başka şehre gönderip zaman kazanın.</li>
                </ul>
            </div>
            <div class="card defense-card">
                <h3>🛡️ Mal Varlığı Koruma</h3>
                <ul class="strategy-list">
                    <li>Haczedilemezlik şikayeti: Ev eşyası veya emekli maaşı haczedildiyse hemen dava açın.</li>
                    <li>Menfi Tespit Davası açarak icrayı durdurma kararı (tedbir) talep edin.</li>
                </ul>
            </div>`;
        }

        html += '</div>';
        if(!isIs && !isIcra && !isCeza) {
            html = "<div class='card'>🔍 Yüklenen metinde net bir hukuki kategori (İş, İcra, Ceza) bulunamadı. Lütfen metnin okunabilir olduğundan emin olun.</div>";
        }
        document.getElementById("result").innerHTML = html;
    }
</script>
</body>
</html>
